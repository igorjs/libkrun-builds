# SPDX-License-Identifier: Apache-2.0
#
# Build relocatable libkrun + libkrunfw artefacts on a matrix of hosts and
# publish them to a GitHub Release tagged `libkrun-v<version>`.
#
# Hardening posture
# -----------------
# - All third-party actions pinned to commit SHAs (immune to tag-swap).
# - Top-level `permissions: {}` then promoted per-job, least privilege.
# - StepSecurity harden-runner active on every job in audit mode. Flip
#   to `egress-policy: block` after a few clean runs confirm the
#   allow-list is complete.
# - Build provenance attestations (SLSA L3 via Sigstore + GitHub OIDC)
#   generated per artefact. Verify with:
#     gh attestation verify <tarball> --repo igorjs-forks/libkrun-builds
# - Cosign keyless signing produces `.sig` + `.pem` sidecars per
#   tarball. Verify with:
#     cosign verify-blob --signature <tarball>.sig \
#       --certificate <tarball>.pem \
#       --certificate-identity-regexp \
#         'https://github.com/igorjs-forks/libkrun-builds/.+' \
#       --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#       <tarball>
# - Upstream tarball SHAs verified inside build.sh against
#   upstream-checksums.txt (file pinned in this repo, refreshed by the
#   watcher).
# - Rust toolchain pinned to a specific version so a future regression
#   in `stable` can't poison a Saturday-morning release.
# - Release job verifies all three matrix tarballs are present before
#   touching checksums.txt; partial failures don't leave a half-truthful
#   file in main.
# - checksums.txt sync goes via PR with auto-merge instead of direct
#   push, giving a diffable audit record on every release.
# - All template expressions sourced from inputs / step outputs are
#   passed through `env:` rather than interpolated into `run:` blocks
#   directly, blocking the standard GitHub Actions injection vector.
#   The version_override input is also format-validated before use.
#
# Triggers: manual via Actions tab, or a push to main that bumps a
# version pin / upstream-checksums.txt (the watcher's normal path).

name: release

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: "Override version (otherwise read from version.txt)"
        required: false
        type: string
  # No push trigger: the watcher dispatches this workflow against the
  # PR branch directly, and the eventual PR merge to main would
  # otherwise duplicate that build with non-bit-identical Rust output
  # overwriting the release. Manual edits to version.txt should go
  # through workflow_dispatch.

permissions: {}

concurrency:
  # Serialise releases for the same libkrun version. Manual dispatch
  # + watcher dispatch racing each other would otherwise both try to
  # publish the same tag.
  group: release-${{ github.workflow }}-${{ inputs.version_override || github.sha }}
  cancel-in-progress: false

jobs:
  # ── Resolve the versions once and propagate to the matrix jobs ─────
  resolve-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      libkrun_version: ${{ steps.read.outputs.libkrun_version }}
      libkrunfw_version: ${{ steps.read.outputs.libkrunfw_version }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: read
        name: Resolve libkrun + libkrunfw versions
        env:
          INPUT_VERSION: ${{ inputs.version_override }}
        run: |
          # Validate the override strictly before letting it near any
          # shell command. semver-ish: digits and dots, optional pre-
          # release suffix. Anything else is treated as an attempted
          # injection.
          if [[ -n "${INPUT_VERSION}" ]]; then
            if ! [[ "${INPUT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$ ]]; then
              echo "error: invalid version_override: '${INPUT_VERSION}'" >&2
              exit 1
            fi
            LIBKRUN_VERSION="${INPUT_VERSION}"
          else
            LIBKRUN_VERSION="$(tr -d '[:space:]' < version.txt)"
          fi
          LIBKRUNFW_VERSION="$(tr -d '[:space:]' < libkrunfw-version.txt)"
          echo "libkrun_version=${LIBKRUN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "libkrunfw_version=${LIBKRUNFW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved versions: libkrun=${LIBKRUN_VERSION}, libkrunfw=${LIBKRUNFW_VERSION}"

  # ── Build per-target ──────────────────────────────────────────────
  build:
    needs: [resolve-version]
    permissions:
      contents: read
      id-token: write       # required by attest-build-provenance and cosign keyless
      attestations: write   # required by attest-build-provenance
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            install_deps: |
              # macOS Apple Silicon: Xcode CLT brings install_name_tool.
              # `lld` is required because libkrun's Makefile passes
              # `-fuse-ld=lld` to clang, and Xcode's clang doesn't ship
              # an `ld.lld` binary. Installing lld pulls llvm as a
              # transitive dep, but Homebrew keeps it keg-only so
              # libclang.dylib isn't on dyld's default search path:
              # export LIBCLANG_PATH + LLVM_CONFIG_PATH so the
              # bindgen-using crates in libkrun (e.g. krun-input,
              # clang-sys) can find them at build time.
              brew install lld pkg-config
              LLVM_PREFIX="$(brew --prefix llvm)"
              echo "LIBCLANG_PATH=${LLVM_PREFIX}/lib" >> "$GITHUB_ENV"
              echo "LLVM_CONFIG_PATH=${LLVM_PREFIX}/bin/llvm-config" >> "$GITHUB_ENV"
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                build-essential clang lld llvm-dev libclang-dev \
                patchelf pkg-config libelf-dev bc bison flex
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                build-essential clang lld llvm-dev libclang-dev \
                patchelf pkg-config libelf-dev \
                bc bison flex
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          # `audit` logs egress without blocking; flip to `block` once
          # a clean release run confirms the allow-list is complete.
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install build dependencies
        run: ${{ matrix.install_deps }}

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-05
        with:
          # Use `stable` rather than a hard-pin: libkrun's transitive
          # deps move with the Rust release train, and a hard-pin too
          # old fails with E0658 on newly-stabilised features (e.g.
          # `unsigned_is_multiple_of` in 1.87) faster than a Rust
          # regression would break the build. The action SHA is still
          # pinned, so we're protected against tag-swap on the
          # toolchain installer itself; we just accept whatever
          # rustup considers stable at run time.
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build libkrun (${{ matrix.target }})
        env:
          TARGET: ${{ matrix.target }}
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Record checksum
        id: checksum
        env:
          LIBKRUN_VERSION: ${{ needs.resolve-version.outputs.libkrun_version }}
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          cd dist
          TARBALL="libkrun-${LIBKRUN_VERSION}-${MATRIX_TARGET}.tar.gz"
          if command -v sha256sum > /dev/null 2>&1; then
            SHA="$(sha256sum "$TARBALL" | awk '{print $1}')"
          else
            SHA="$(shasum -a 256 "$TARBALL" | awk '{print $1}')"
          fi
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "${SHA}  ${TARBALL}" > "${TARBALL}.sha256"
          echo "Checksum for ${TARBALL}: ${SHA}"

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/${{ steps.checksum.outputs.tarball }}

      - name: Self-verify attestation
        # Sanity check that the attestation pipeline is wired correctly:
        # if `gh attestation verify` can't find or validate the statement
        # we just created, neither will downstream consumers. Retries to
        # absorb the brief API-propagation window after
        # attest-build-provenance returns; if the attestation still
        # isn't visible after ~1 minute, the pipeline is broken and the
        # release fails loud rather than publishing unverifiable bytes.
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARBALL: ${{ steps.checksum.outputs.tarball }}
        run: |
          cd dist
          for attempt in 1 2 3 4 5 6; do
            if gh attestation verify "${TARBALL}" --repo "${REPO}"; then
              echo "Attestation verified on attempt ${attempt}"
              exit 0
            fi
            echo "Attestation not yet visible (attempt ${attempt}/6), retrying in 10s..."
            sleep 10
          done
          echo "error: attestation verification failed after 6 attempts" >&2
          exit 1

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign tarball with cosign (keyless OIDC)
        env:
          COSIGN_YES: "true"
          TARBALL: ${{ steps.checksum.outputs.tarball }}
        run: |
          cd dist
          cosign sign-blob \
            --output-signature "${TARBALL}.sig" \
            --output-certificate "${TARBALL}.pem" \
            "${TARBALL}"

      - name: Self-verify cosign signature
        # Same defence in depth: the signing step writes .sig + .pem
        # without ever validating them. A misconfigured OIDC issuer or
        # cert identity would silently produce signatures consumers
        # can't verify; catching it here saves a broken release.
        env:
          REPO: ${{ github.repository }}
          TARBALL: ${{ steps.checksum.outputs.tarball }}
        run: |
          cd dist
          cosign verify-blob \
            --signature "${TARBALL}.sig" \
            --certificate "${TARBALL}.pem" \
            --certificate-identity-regexp "https://github.com/${REPO}/.+" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${TARBALL}"

      - name: Generate CycloneDX SBOM
        # SBOMs the staged build directory containing libkrun's
        # Cargo.toml / Cargo.lock plus libkrunfw artefacts. Syft picks
        # up every Cargo dep + version. Attached as a release sidecar
        # so consumers can audit via Grype / OSV-Scanner / Anchore.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: build/${{ matrix.target }}/libkrun
          format: cyclonedx-json
          output-file: dist/${{ steps.checksum.outputs.tarball }}.sbom.cdx.json
          upload-artifact: false

      - name: Upload artefact (per-target build output)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: libkrun-${{ matrix.target }}
          path: |
            dist/libkrun-*-${{ matrix.target }}.tar.gz
            dist/libkrun-*-${{ matrix.target }}.tar.gz.sha256
            dist/libkrun-*-${{ matrix.target }}.tar.gz.sig
            dist/libkrun-*-${{ matrix.target }}.tar.gz.pem
            dist/libkrun-*-${{ matrix.target }}.tar.gz.sbom.cdx.json
          if-no-files-found: error
          retention-days: 14

  # ── Publish all targets in one release ────────────────────────────
  release:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write       # required to create/update the release
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all build artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true

      - name: Verify all three targets present
        run: |
          # Guard against a partial-matrix release sneaking through.
          # `fail-fast: false` means one target failing doesn't stop
          # the others; this check makes sure we never publish a
          # release that's missing a triple.
          shopt -s nullglob
          tarballs=( dist/libkrun-*.tar.gz )
          if (( ${#tarballs[@]} != 3 )); then
            echo "error: expected 3 tarballs, found ${#tarballs[@]}" >&2
            ls -la dist/ >&2
            exit 1
          fi
          echo "Found tarballs:"
          printf '  %s\n' "${tarballs[@]}"

      - name: Summarise checksums
        env:
          LIBKRUN_VERSION: ${{ needs.resolve-version.outputs.libkrun_version }}
        run: |
          {
            echo "## Vendor build summary"
            echo ""
            echo "Version: \`${LIBKRUN_VERSION}\`"
            echo ""
            echo "Copy the following lines into \`checksums.txt\`:"
            echo ""
            echo '```'
            cat dist/*.sha256 | sort
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: libkrun-v${{ needs.resolve-version.outputs.libkrun_version }}
          name: libkrun ${{ needs.resolve-version.outputs.libkrun_version }}
          body: |
            Pre-built libkrun + libkrunfw binaries.

            Layout (inside each tarball):
            ```
            lib/libkrun.{dylib,so}      relocatable, @rpath / $ORIGIN install names
            lib/libkrunfw.{dylib,so}    same
            lib/pkgconfig/libkrun.pc    synthesised, prefix placeholder
            include/libkrun.h
            ```

            ### Verifying this release

            **SHA-256** (fastest, no extra tools):
            ```
            sha256sum -c <tarball>.sha256        # Linux
            shasum -a 256 -c <tarball>.sha256    # macOS
            ```

            **Build provenance attestation** (proves this binary was built by
            this workflow on this commit):
            ```
            gh attestation verify <tarball> --repo ${{ github.repository }}
            ```

            **Cosign keyless signature**:
            ```
            cosign verify-blob \
              --signature <tarball>.sig \
              --certificate <tarball>.pem \
              --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.+' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              <tarball>
            ```
          files: |
            dist/libkrun-*.tar.gz
            dist/libkrun-*.tar.gz.sha256
            dist/libkrun-*.tar.gz.sig
            dist/libkrun-*.tar.gz.pem
            dist/libkrun-*.tar.gz.sbom.cdx.json
          fail_on_unmatched_files: true

  # ── Sync checksums.txt via PR (diffable audit, optional auto-merge) ─
  sync-checksums:
    needs: [resolve-version, release]
    runs-on: ubuntu-latest
    # GITHUB_TOKEN scope is minimal: the App token does the writes.
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Mint App installation token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Download all .sha256 sidecars
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true

      - name: Rebuild checksums.txt
        run: |
          # Preserve the comment/blank header, then append the sorted
          # sums from the freshly built .sha256 sidecars. Keeps
          # checksums.txt in lockstep with the published release so
          # the watcher's automatic bumps never leave it stale.
          { grep -E '^#|^$' checksums.txt || true; cat dist/*.sha256 | sort; } > checksums.txt.new
          mv checksums.txt.new checksums.txt

      - name: Open PR to sync checksums.txt
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app_token.outputs.token }}
          commit-message: "chore: update checksums for libkrun-v${{ needs.resolve-version.outputs.libkrun_version }}"
          title: "chore: sync checksums for libkrun-v${{ needs.resolve-version.outputs.libkrun_version }}"
          body: |
            Auto-generated by `.github/workflows/release.yml` after publishing
            `libkrun-v${{ needs.resolve-version.outputs.libkrun_version }}`.

            This PR keeps `checksums.txt` in lockstep with the binaries
            attached to the release. If auto-merge is enabled at the
            repo level, this PR merges itself; otherwise it waits for
            human review.
          branch: bot/sync-checksums-v${{ needs.resolve-version.outputs.libkrun_version }}
          base: main
          delete-branch: true
          add-paths: checksums.txt
          labels: |
            automated
            checksums

      - name: Enable auto-merge on the sync PR
        if: steps.cpr.outputs.pull-request-number
        continue-on-error: true
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d # v3.0.0
        with:
          token: ${{ steps.app_token.outputs.token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
