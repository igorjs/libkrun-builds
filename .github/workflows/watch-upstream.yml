# SPDX-License-Identifier: Apache-2.0
#
# Watch containers/libkrun + containers/libkrunfw for new stable releases and,
# when either is ahead of the versions pinned here, open a PR bumping
# version.txt / libkrunfw-version.txt + upstream-checksums.txt and dispatch
# the release workflow against the PR branch so the build proceeds in
# parallel with PR merge.
#
# Consequences to be aware of:
#   - A libkrun bump publishes a new `libkrun-v<new>` release (new tag).
#   - A libkrunfw-only bump rebuilds and OVERWRITES the existing
#     `libkrun-v<libkrun>` release with new builds (same tag, new bytes).
#   - Either way the build checksums change, so downstream consumers that
#     pin checksums must re-pin before their own releases will accept the
#     new build.
#
# Hardening posture
# -----------------
# - All actions pinned to commit SHAs.
# - Top-level `permissions: {}`, promoted per job.
# - harden-runner in audit mode.
# - When bumping a version pin, also computes the SHA-256 of every
#   upstream tarball that build.sh will fetch, so an upstream tamper
#   between watch-time and build-time fails loud instead of flowing
#   through silently.
# - Version bumps land via `peter-evans/create-pull-request`, which
#   creates commits via GitHub's REST API. API-created commits are
#   auto-signed by GitHub with a verifying key, which means this
#   workflow is compatible with a "Require signed commits" ruleset
#   without setting up GPG keys for the bot.
# - The release workflow is dispatched against the PR branch directly,
#   so builds don't block on PR merge. The PR auto-merges once any
#   required reviews / status checks clear, syncing main with the
#   already-published release. For uninterrupted automation, add the
#   `github-actions` bot to the ruleset's bypass list.

name: watch upstream

on:
  schedule:
    - cron: "0 14 * * *" # daily, midnight AEST (Sydney)
  workflow_dispatch: # allow on-demand checks

permissions: {}

concurrency:
  group: watch-upstream
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # peter-evans/create-pull-request needs this
      pull-requests: write  # open PR + enable auto-merge
      actions: write        # dispatch the release workflow
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check upstream releases and bump pins
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Latest non-prerelease tag for a repo, leading 'v' stripped.
          latest() {
            gh api "repos/$1/releases/latest" --jq '.tag_name' | sed 's/^v//'
          }

          # True when $1 is a strictly newer version than $2 (semver via sort -V).
          newer() {
            [[ "$1" != "$2" ]] && \
              [[ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | tail -1)" == "$1" ]]
          }

          KRUN_PINNED="$(tr -d '[:space:]' < version.txt)"
          KRUNFW_PINNED="$(tr -d '[:space:]' < libkrunfw-version.txt)"
          KRUN_LATEST="$(latest containers/libkrun)"
          KRUNFW_LATEST="$(latest containers/libkrunfw)"

          echo "libkrun:   pinned=${KRUN_PINNED} latest=${KRUN_LATEST}"
          echo "libkrunfw: pinned=${KRUNFW_PINNED} latest=${KRUNFW_LATEST}"

          changed=false
          if newer "${KRUN_LATEST}" "${KRUN_PINNED}"; then
            printf '%s\n' "${KRUN_LATEST}" > version.txt
            changed=true
            echo "==> bump libkrun ${KRUN_PINNED} -> ${KRUN_LATEST}"
          fi
          if newer "${KRUNFW_LATEST}" "${KRUNFW_PINNED}"; then
            printf '%s\n' "${KRUNFW_LATEST}" > libkrunfw-version.txt
            changed=true
            echo "==> bump libkrunfw ${KRUNFW_PINNED} -> ${KRUNFW_LATEST}"
          fi

          # Build when a version changed, or when no release exists yet for the
          # current libkrun pin (auto-retry a previously failed build).
          KRUN_NOW="$(tr -d '[:space:]' < version.txt)"
          release_missing=false
          gh release view "libkrun-v${KRUN_NOW}" > /dev/null 2>&1 || release_missing=true

          build_needed=false
          if [[ "${changed}" == true || "${release_missing}" == true ]]; then
            build_needed=true
          else
            echo "==> Up to date with a published release; nothing to do."
          fi

          {
            echo "changed=${changed}"
            echo "build_needed=${build_needed}"
            echo "libkrun_now=${KRUN_NOW}"
          } >> "$GITHUB_OUTPUT"

      - name: Refresh upstream-checksums.txt
        if: steps.bump.outputs.changed == 'true'
        run: |
          set -euo pipefail

          # Fetch every upstream asset that build.sh will download and
          # record its SHA-256. build.sh verifies against this file at
          # build time, so a tampered upstream asset after the watcher
          # has run won't poison the release silently: the build fails
          # loudly with an SHA mismatch.

          LIBKRUN_NEW="$(tr -d '[:space:]' < version.txt)"
          LIBKRUNFW_NEW="$(tr -d '[:space:]' < libkrunfw-version.txt)"

          tmp="$(mktemp -d)"
          declare -a entries=()

          echo "==> Fetching libkrun v${LIBKRUN_NEW} source tarball"
          curl --fail --silent --show-error --location \
            --output "${tmp}/source.tar.gz" \
            "https://github.com/containers/libkrun/archive/refs/tags/v${LIBKRUN_NEW}.tar.gz"
          sha="$(sha256sum "${tmp}/source.tar.gz" | awk '{print $1}')"
          entries+=("${sha}  libkrun/v${LIBKRUN_NEW}/source.tar.gz")

          for asset in libkrunfw-prebuilt-aarch64.tgz libkrunfw-x86_64.tgz libkrunfw-aarch64.tgz; do
            echo "==> Fetching libkrunfw v${LIBKRUNFW_NEW} (${asset})"
            curl --fail --silent --show-error --location \
              --output "${tmp}/${asset}" \
              "https://github.com/containers/libkrunfw/releases/download/v${LIBKRUNFW_NEW}/${asset}"
            sha="$(sha256sum "${tmp}/${asset}" | awk '{print $1}')"
            entries+=("${sha}  libkrunfw/v${LIBKRUNFW_NEW}/${asset}")
          done

          # Preserve the comment/blank header, replace the body.
          {
            grep -E '^#|^$' upstream-checksums.txt || true
            printf '%s\n' "${entries[@]}"
          } > upstream-checksums.txt.new
          mv upstream-checksums.txt.new upstream-checksums.txt

          echo "==> New upstream-checksums.txt:"
          cat upstream-checksums.txt

          rm -rf "${tmp}"

      - name: Open PR with version bumps + refreshed upstream checksums
        id: cpr
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore: bump pinned libkrun/libkrunfw to latest upstream"
          title: "chore: bump pinned libkrun/libkrunfw to latest upstream"
          body: |
            Auto-generated by `.github/workflows/watch-upstream.yml`.

            Bumps `version.txt`, `libkrunfw-version.txt`, and refreshes
            `upstream-checksums.txt` to the SHAs observed at watch time.
            The release workflow has been dispatched against this PR's
            branch in parallel; check the Actions tab for build status.

            Once any required reviews / status checks clear, this PR
            will auto-merge and sync main with the already-published
            release.
          branch: bot/bump-libkrun-${{ steps.bump.outputs.libkrun_now }}
          base: main
          delete-branch: true
          add-paths: |
            version.txt
            libkrunfw-version.txt
            upstream-checksums.txt
          labels: |
            automated
            dependencies

      - name: Enable auto-merge on the bump PR
        if: steps.cpr.outputs.pull-request-number
        continue-on-error: true
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d # v3.0.0
        with:
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

      - name: Dispatch release workflow against the PR branch
        if: steps.bump.outputs.build_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          # When the bump created a PR, build from the PR branch so the
          # release picks up the new version.txt / upstream-checksums.txt
          # without waiting for the PR to merge. When the bump was
          # skipped (release was missing for the current main pin),
          # build from main.
          DISPATCH_REF: ${{ steps.cpr.outputs.pull-request-branch || 'main' }}
        run: |
          echo "Dispatching release.yml against ref: ${DISPATCH_REF}"
          gh workflow run release.yml --ref "${DISPATCH_REF}"
